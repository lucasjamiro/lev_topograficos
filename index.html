<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      width="device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Simulador Topográfico - Stlite</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="stlite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["folium", "streamlit-folium", "numpy", "pandas", "utm"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py",
            },
            "simulator.py": {
              url: "simulator.py",
            },
          },
        },
        document.getElementById("stlite")
      );
    </script>
  </body>
</html>
