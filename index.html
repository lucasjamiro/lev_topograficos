<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Simulador de Levantamentos Topográficos</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.1/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["streamlit-folium", "folium", "pandas", "numpy"],
          entrypoint: "app.py",
          files: {
            "app.py": `
import streamlit as st
import folium
from streamlit_folium import st_folium
import simulator
import pandas as pd
import numpy as np

st.set_page_config(page_title="Simulador de Levantamentos Topográficos", layout="wide")

st.title("🏗️ Simulador de Levantamentos Topográficos")

# --- Sidebar ---
st.sidebar.header("Configurações do Levantamento")

survey_category = st.sidebar.selectbox(
    "Tipo de Levantamento",
    ["Poligonação", "Nivelamento"]
)

if survey_category == "Poligonação":
    survey_type = st.sidebar.radio("Subtipo", ["Fechada", "Enquadrada"])
    n_points = st.sidebar.slider("Número de Pontos", 3, 20, 5)
    angle_precision = st.sidebar.number_input("Precisão Angular (graus)", 0.0, 0.1, 0.005, format="%.4f")
    dist_precision = st.sidebar.number_input("Precisão Linear (proporcional)", 0.0, 0.05, 0.001, format="%.4f")
else:
    survey_type = st.sidebar.radio("Subtipo", ["Geométrico", "Trigonométrico"])
    n_points = st.sidebar.slider("Número de Pontos", 2, 50, 10)
    error_km = st.sidebar.number_input("Erro por km (m)", 0.0, 0.05, 0.005, format="%.3f")

# Starting point
st.sidebar.subheader("Localização Inicial")
start_lat = st.sidebar.number_input("Latitude", value=-23.5505, format="%.6f")
start_lon = st.sidebar.number_input("Longitude", value=-46.6333, format="%.6f")

# --- Data Generation ---
if survey_category == "Poligonação":
    sim_type = "Closed" if survey_type == "Fechada" else "Linked"
    lats, lons = simulator.generate_traverse_coordinates(n_points, survey_type=sim_type, start_lat=start_lat, start_lon=start_lon)
    observations = simulator.simulate_traverse_observations(lats, lons, angle_sigma=angle_precision, dist_sigma=dist_precision)

    # Prepare data for map
    points_df = pd.DataFrame({"lat": lats, "lon": lons})
    points_df["label"] = [f"P{i+1}" for i in range(len(lats))]
else:
    # For leveling, we'll generate a linear traverse to show on map too
    lats, lons = simulator.generate_traverse_coordinates(n_points, survey_type="Linked", start_lat=start_lat, start_lon=start_lon)
    sim_type = "Geometric" if survey_type == "Geométrico" else "Trigonometric"
    observations, elevations = simulator.simulate_leveling(n_points, type=sim_type, error_per_km=error_km)

    points_df = pd.DataFrame({"lat": lats, "lon": lons, "elevation": elevations})
    points_df["label"] = [f"P{i+1}" for i in range(len(lats))]

# --- Layout ---
col1, col2 = st.columns([1, 1])

with col1:
    st.subheader("Visualização Espacial")
    m = folium.Map(location=[start_lat, start_lon], zoom_start=16)

    # Add Path
    path = list(zip(lats, lons))
    folium.PolyLine(path, color="blue", weight=2.5, opacity=1).add_to(m)

    # Add Markers
    for idx, row in points_df.iterrows():
        popup_text = f"Ponto: {row['label']}"
        if 'elevation' in row:
            popup_text += f"<br>Elev: {row['elevation']:.3f}m"

        folium.CircleMarker(
            location=[row['lat'], row['lon']],
            radius=5,
            color="red",
            fill=True,
            fill_color="red",
            popup=popup_text
        ).add_to(m)

        folium.Marker(
            location=[row['lat'], row['lon']],
            icon=folium.DivIcon(
                html=f'<div style="font-size: 10pt; color: black; font-weight: bold;">{row["label"]}</div>',
                icon_anchor=(0, 0)
            )
        ).add_to(m)

    st_folium(m, width=700, height=500)

with col2:
    st.subheader("Caderneta de Campo (Simulada)")
    st.dataframe(observations, use_container_width=True)

    if survey_category == "Nivelamento":
        st.subheader("Cotas Calculadas")
        st.dataframe(points_df[["label", "elevation"]].style.format({"elevation": "{:.3f}"}), use_container_width=True)
    else:
        st.subheader("Coordenadas Geográficas")
        st.dataframe(points_df[["label", "lat", "lon"]].style.format({"lat": "{:.6f}", "lon": "{:.6f}"}), use_container_width=True)

st.info("Nota: Os dados são gerados aleatoriamente com base nos parâmetros de precisão selecionados.")
`,
            "simulator.py": `
import numpy as np
import pandas as pd

def generate_traverse_coordinates(n_points, survey_type="Closed", start_lat=-23.5505, start_lon=-46.6333, scale=0.001):
    """
    Generates a set of coordinates for a traverse survey.
    scale: rough distance between points in degrees (approx 100m)
    """
    if survey_type == "Closed":
        # Generate points in a circle/polygon with some randomness
        angles = np.linspace(0, 2 * np.pi, n_points, endpoint=False)
        radius = scale * (n_points / (2 * np.pi))

        lats = []
        lons = []
        for angle in angles:
            r = radius * np.random.uniform(0.8, 1.2)
            lats.append(start_lat + np.cos(angle) * r)
            lons.append(start_lon + np.sin(angle) * r)

        # Close the loop
        lats.append(lats[0])
        lons.append(lons[0])
    else: # Linked or just a line
        lats = [start_lat]
        lons = [start_lon]
        current_lat, current_lon = start_lat, start_lon

        # General direction: North-East
        base_angle = np.pi / 4

        for i in range(n_points - 1):
            angle = base_angle + np.random.uniform(-np.pi/4, np.pi/4)
            current_lat += np.cos(angle) * scale
            current_lon += np.sin(angle) * scale
            lats.append(current_lat)
            lons.append(current_lon)

    return np.array(lats), np.array(lons)

def calculate_azimuth(lat1, lon1, lat2, lon2):
    dlon = lon2 - lon1
    y = np.sin(np.radians(dlon)) * np.cos(np.radians(lat2))
    x = np.cos(np.radians(lat1)) * np.sin(np.radians(lat2)) - \
        np.sin(np.radians(lat1)) * np.cos(np.radians(lat2)) * np.cos(np.radians(dlon))
    azimuth = np.degrees(np.arctan2(y, x))
    return (azimuth + 360) % 360

def simulate_traverse_observations(lats, lons, angle_sigma=0.005, dist_sigma=0.01):
    """
    Simulates field observations: Horizontal Angles and Distances.
    angle_sigma: standard deviation for angles in degrees.
    dist_sigma: standard deviation for distance in relative terms (fraction).
    """
    n = len(lats)
    observations = []

    for i in range(1, n):
        # Distance (approximate in degrees, then "scaled" to meters for simulation)
        dist_deg = np.sqrt((lats[i] - lats[i-1])**2 + (lons[i] - lons[i-1])**2)
        dist_m = dist_deg * 111139 # Rough conversion to meters

        # Add noise to distance
        measured_dist = dist_m * (1 + np.random.normal(0, dist_sigma))

        # Azimuth
        az = calculate_azimuth(lats[i-1], lons[i-1], lats[i], lons[i])

        # In a real survey we measure internal angles, but for simulation
        # providing azimuths or relative angles is fine.
        # Let's simulate "Deflection angles" or "Internal angles"
        # For simplicity, we'll return Azimuth and Distance as typical "processed" observations
        # or simulate the angle between segments.

        if i == 1:
            measured_angle = az # First point uses North or arbitrary ref
        else:
            prev_az = calculate_azimuth(lats[i-2], lons[i-2], lats[i-1], lons[i-1])
            measured_angle = (az - prev_az + 360) % 360

        # Add noise to angle
        measured_angle = (measured_angle + np.random.normal(0, angle_sigma)) % 360

        observations.append({
            "From": f"P{i}",
            "To": f"P{i+1}",
            "Distance (m)": round(measured_dist, 3),
            "Angle (deg)": round(measured_angle, 4)
        })

    return pd.DataFrame(observations)

def simulate_leveling(n_points, type="Geometric", start_elev=100.0, dist_scale=100, error_per_km=0.005):
    """
    Simulates leveling observations.
    """
    elevations = [start_elev]
    current_elev = start_elev

    observations = []

    for i in range(1, n_points):
        dist = np.random.uniform(30, 80) # Distance between stations
        delta_h = np.random.uniform(-2, 2) # Random terrain variation

        # Add noise proportional to sqrt(distance)
        noise = np.random.normal(0, error_per_km * np.sqrt(dist/1000))

        measured_delta_h = delta_h + noise
        current_elev += delta_h
        elevations.append(current_elev)

        if type == "Geometric":
            # Backsight (BS) and Foresight (FS)
            # Typically BS - FS = delta_h
            bs = np.random.uniform(1.0, 2.0)
            fs = bs - measured_delta_h
            observations.append({
                "Station": f"S{i}",
                "BS (m)": round(bs, 3),
                "FS (m)": round(fs, 3),
                "Dist (m)": round(dist, 1)
            })
        else: # Trigonometric
            # Vertical angle and Slope distance
            slope_dist = np.sqrt(dist**2 + measured_delta_h**2)
            vert_angle = np.degrees(np.arctan2(measured_delta_h, dist))
            observations.append({
                "From": f"P{i}",
                "To": f"P{i+1}",
                "Slope Dist (m)": round(slope_dist, 3),
                "Vert Angle (deg)": round(vert_angle, 4),
                "Inst Height (m)": 1.500,
                "Target Height (m)": 1.500
            })

    return pd.DataFrame(observations), elevations
`,
          },
        },
        document.getElementById("root")
      );
    </script>
